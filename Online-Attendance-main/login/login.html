<!DOCTYPE html>
<html lang="en">

<head>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW registered', reg.scope))
        .catch(err => console.error('SW registration failed', err));
    });
  }
</script>
    <meta name="theme-color" content="#4481eb">
    <link rel="icon" type="image/svg+xml" href="img/smartattend_logo.svg?v=4">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="../img/smartattend_logo.svg?v=4">
    
    
    
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/login.css?v=2">
    <title>SmartAttend | Login</title>
    
    <style>
        /* Global App Button Styles */
        button, 
        .btn, 
        input[type="submit"], 
        .toggle-eye, 
        .nav_btn, 
        .btn_primary {
            -webkit-tap-highlight-color: transparent !important;
            user-select: none !important;
            -webkit-user-select: none !important;
            cursor: pointer !important;
            text-decoration: none !important;
        }
        button:focus, 
        .btn:focus, 
        input[type="submit"]:focus {
            outline: none !important;
        }
    </style>
    <script>
        // Anti-Inspect Script
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', event => {
            if (event.keyCode === 123 || 
               (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74)) || 
               (event.ctrlKey && event.keyCode === 85)) {
                event.preventDefault();
                return false;
            }
        });
    </script>
</head>

<body>

    <div class="container" id="container">
        <div class="form-container sign-in">
            <form>
                <h1>Teacher Login</h1>
                <p style="text-align: center;">A Teacher is a professional who teaches students 
                    based on national curriculum guidelines within their specialist subject areas</p>
                    <button type="button" onclick="window.location.href='Teacher/login.html'">Login</button>

            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-right">
                    <h1>Student Login</h1>
                    <p>A student is someone who is enrolled in a degree-granting program at an institution of higher learning</p>
                    <button class="hidden" onclick="window.location.href='Student/login.html'">Login</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
